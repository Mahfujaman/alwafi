<!DOCTYPE html>
<html lang="bn" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>وافي — আরবী-বাংলা অভিধান</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Noto+Serif+Bengali:wght@400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  /* ===== LIGHT MODE (default) ===== */
  :root {
    --ink:        #1a1208;
    --parchment:  #faf6ee;
    --cream:      #f2ead8;
    --gold:       #b5882a;
    --gold-light: #d4a84b;
    --gold-pale:  #f5e6c0;
    --teal:       #1e6b6b;
    --teal-light: #2a8f8f;
    --teal-pale:  #e0f2f2;
    --border:     #ddd0b0;
    --muted:      #7a6b4e;
    --white:      #ffffff;
    --shadow:     rgba(26,18,8,0.10);
    --card-bg:    #ffffff;
    --fav-color:  #e8a020;
  }

  /* ===== DARK MODE ===== */
  body.dark {
    --ink:        #e8dcc8;
    --parchment:  #141210;
    --cream:      #1e1a14;
    --gold:       #d4a84b;
    --gold-light: #e8c070;
    --gold-pale:  #2a2010;
    --teal:       #4ab8b8;
    --teal-light: #60d0d0;
    --teal-pale:  #0a2020;
    --border:     #3a3020;
    --muted:      #9a8a6a;
    --white:      #1e1a14;
    --shadow:     rgba(0,0,0,0.4);
    --card-bg:    #1e1a14;
    --fav-color:  #f0c040;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Serif Bengali', 'Amiri', serif;
    background: var(--parchment);
    color: var(--ink);
    min-height: 100vh;
    transition: background 0.3s, color 0.3s;
  }

  /* ===== HEADER ===== */
  header {
    background: linear-gradient(135deg, #1a1208 0%, #2d1f0a 60%, #1e3a3a 100%);
    color: #fff;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 16px rgba(0,0,0,0.35);
  }

  body.dark header {
    background: linear-gradient(135deg, #0a0806 0%, #1a1008 60%, #0a1a1a 100%);
  }

  .header-inner {
    max-width: 900px;
    margin: 0 auto;
    padding: 16px 20px 12px;
  }

  .logo-row {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 12px;
  }

  .logo-arabic {
    font-family: 'Amiri', serif;
    font-size: 2.4rem;
    color: var(--gold-light);
    line-height: 1;
    direction: rtl;
  }

  .logo-text { flex: 1; }
  .logo-text h1 {
    font-size: 1.1rem;
    font-weight: 700;
    color: #fff;
    letter-spacing: 0.02em;
  }
  .logo-text p {
    font-size: 0.78rem;
    color: rgba(255,255,255,0.5);
    font-family: 'Inter', sans-serif;
    margin-top: 2px;
  }

  /* Dark mode toggle */
  .header-actions {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  #darkToggle {
    background: rgba(255,255,255,0.1);
    border: 1.5px solid rgba(255,255,255,0.2);
    border-radius: 20px;
    color: #fff;
    padding: 5px 12px;
    font-size: 0.82rem;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  #darkToggle:hover { background: rgba(255,255,255,0.18); }

  /* ===== SEARCH BAR ===== */
  .search-wrapper {
    position: relative;
    display: flex;
    align-items: center;
  }

  #searchInput {
    flex: 1;
    padding: 11px 44px 11px 16px;
    border: 2px solid rgba(181,136,42,0.4);
    border-radius: 8px;
    background: rgba(255,255,255,0.08);
    color: #fff;
    font-family: 'Amiri', 'Noto Serif Bengali', serif;
    font-size: 1.15rem;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
    direction: auto;
    width: 100%;
  }
  #searchInput::placeholder { color: rgba(255,255,255,0.4); }
  #searchInput:focus {
    border-color: var(--gold-light);
    background: rgba(255,255,255,0.12);
  }

  .search-icon {
    position: absolute;
    right: 14px;
    color: var(--gold-light);
    font-size: 1.1rem;
    pointer-events: none;
  }

  .mode-tabs {
    display: flex;
    gap: 6px;
    margin-top: 10px;
    flex-wrap: wrap;
  }

  .mode-tab {
    padding: 5px 14px;
    border-radius: 20px;
    border: 1.5px solid rgba(181,136,42,0.35);
    background: transparent;
    color: rgba(255,255,255,0.6);
    font-size: 0.8rem;
    font-family: 'Noto Serif Bengali', serif;
    cursor: pointer;
    transition: all 0.18s;
  }
  .mode-tab.active {
    background: var(--gold);
    border-color: var(--gold);
    color: #fff;
    font-weight: 600;
  }
  .mode-tab:not(.active):hover {
    border-color: var(--gold-light);
    color: var(--gold-light);
  }

  /* ===== MAIN ===== */
  main {
    max-width: 900px;
    margin: 0 auto;
    padding: 20px 16px 60px;
  }

  /* ===== STATS BAR ===== */
  .stats-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    background: var(--cream);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 16px;
    font-size: 0.82rem;
    font-family: 'Inter', sans-serif;
    color: var(--muted);
    transition: background 0.3s, border-color 0.3s;
  }
  #resultCount { font-weight: 500; color: var(--teal); }
  #loadStatus { color: var(--gold); }

  /* ===== ENTRY CARD ===== */
  #resultsList { list-style: none; }

  .entry-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 10px;
    overflow: hidden;
    transition: box-shadow 0.18s, border-color 0.18s, background 0.3s;
    cursor: pointer;
  }
  .entry-card:hover {
    box-shadow: 0 4px 18px var(--shadow);
    border-color: var(--gold);
  }
  .entry-card.expanded { border-color: var(--teal); }

  .entry-header {
    display: flex;
    align-items: center;
    padding: 13px 16px;
    gap: 10px;
  }

  /* Favorite star button */
  .fav-btn {
    background: none;
    border: none;
    font-size: 1.2rem;
    cursor: pointer;
    color: var(--border);
    flex: 0 0 auto;
    padding: 2px 4px;
    transition: color 0.2s, transform 0.15s;
    line-height: 1;
  }
  .fav-btn:hover { transform: scale(1.2); }
  .fav-btn.active { color: var(--fav-color); }

  .entry-word {
    font-family: 'Amiri', serif;
    font-size: 1.5rem;
    color: var(--ink);
    direction: rtl;
    text-align: right;
    flex: 0 0 auto;
    max-width: 42%;
    line-height: 1.4;
  }
  .entry-word.bangla-word {
    font-family: 'Noto Serif Bengali', serif;
    font-size: 1.05rem;
    direction: ltr;
    text-align: left;
  }

  .entry-arrow {
    color: var(--gold);
    font-size: 0.9rem;
    flex: 0 0 auto;
    opacity: 0.6;
  }

  .entry-preview {
    flex: 1;
    font-family: 'Noto Serif Bengali', serif;
    font-size: 0.88rem;
    color: var(--muted);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .entry-preview.arabic-meaning {
    font-family: 'Amiri', serif;
    font-size: 1.05rem;
    direction: rtl;
    text-align: right;
    color: var(--ink);
  }

  .entry-toggle {
    flex: 0 0 auto;
    color: var(--muted);
    font-size: 0.75rem;
    transition: transform 0.2s;
  }
  .entry-card.expanded .entry-toggle { transform: rotate(180deg); }

  /* Detail panel */
  .entry-detail {
    display: none;
    padding: 0 18px 16px;
    border-top: 1px solid var(--border);
  }
  .entry-card.expanded .entry-detail { display: block; }

  .detail-inner { padding-top: 14px; }

  .detail-label {
    font-family: 'Inter', sans-serif;
    font-size: 0.68rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 6px;
  }

  .detail-word-full {
    font-family: 'Amiri', serif;
    font-size: 2rem;
    direction: rtl;
    text-align: right;
    color: var(--ink);
    line-height: 1.5;
    margin-bottom: 12px;
    padding: 12px 16px;
    background: var(--gold-pale);
    border-radius: 8px;
    border-right: 4px solid var(--gold);
    transition: background 0.3s;
  }
  .detail-word-full.bangla-word-full {
    font-family: 'Noto Serif Bengali', serif;
    font-size: 1.35rem;
    direction: ltr;
    text-align: left;
    background: var(--teal-pale);
    border-right: none;
    border-left: 4px solid var(--teal);
  }

  .detail-meaning {
    font-size: 1rem;
    line-height: 1.8;
    color: var(--ink);
    padding: 12px 16px;
    background: var(--cream);
    border-radius: 8px;
    transition: background 0.3s;
  }
  .detail-meaning.arabic-meaning-full {
    font-family: 'Amiri', serif;
    font-size: 1.2rem;
    direction: rtl;
    text-align: right;
    background: var(--gold-pale);
  }

  .pronunciation {
    font-family: 'Inter', sans-serif;
    color: var(--teal);
    font-size: 0.86rem;
    margin-top: 8px;
  }

  /* ===== EMPTY STATE ===== */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .empty-state .empty-arabic {
    font-family: 'Amiri', serif;
    font-size: 4rem;
    color: var(--gold-pale);
    direction: rtl;
    margin-bottom: 12px;
  }

  /* ===== LOADING ===== */
  .loading-screen { text-align: center; padding: 80px 20px; }
  .loading-spinner {
    width: 44px; height: 44px;
    border: 4px solid var(--border);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 18px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-arabic {
    font-family: 'Amiri', serif;
    font-size: 1.8rem;
    color: var(--gold);
    direction: rtl;
    margin-bottom: 8px;
  }

  /* ===== PAGINATION ===== */
  .pagination {
    display: flex;
    justify-content: center;
    gap: 6px;
    margin-top: 20px;
    flex-wrap: wrap;
  }
  .page-btn {
    padding: 6px 13px;
    border: 1.5px solid var(--border);
    border-radius: 6px;
    background: var(--card-bg);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    font-size: 0.84rem;
    cursor: pointer;
    transition: all 0.15s;
  }
  .page-btn:hover { border-color: var(--gold); color: var(--gold); }
  .page-btn.active { background: var(--gold); border-color: var(--gold); color: #fff; }
  .page-btn:disabled { opacity: 0.3; cursor: default; }

  /* ===== FOOTER ===== */
  footer {
    text-align: center;
    padding: 18px;
    color: var(--muted);
    font-size: 0.76rem;
    font-family: 'Inter', sans-serif;
    border-top: 1px solid var(--border);
    margin-top: 20px;
  }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 600px) {
    .entry-word { font-size: 1.2rem; max-width: 36%; }
    .entry-preview { font-size: 0.8rem; }
    .logo-arabic { font-size: 1.9rem; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo-row">
      <div class="logo-arabic">وافي</div>
      <div class="logo-text">
        <h1>আরবী-বাংলা অভিধান</h1>
        <p>Arabic ↔ Bengali Dictionary · ৭৪,৮৫৫ শব্দ</p>
      </div>
      <div class="header-actions">
        <button id="darkToggle" title="ডার্ক মোড">🌙 ডার্ক</button>
      </div>
    </div>
    <div class="search-wrapper">
      <input type="search" id="searchInput"
             placeholder="আরবী বা বাংলায় খুঁজুন… مثال: كتب / বই"
             autocomplete="off" autocorrect="off" spellcheck="false">
      <span class="search-icon">🔍</span>
    </div>
    <div class="mode-tabs">
      <button class="mode-tab active" data-mode="all">সব</button>
      <button class="mode-tab" data-mode="ar">আরবী → বাংলা</button>
      <button class="mode-tab" data-mode="bn">বাংলা → আরবী</button>
      <button class="mode-tab" data-mode="fav">★ ফেভারিট</button>
    </div>
  </div>
</header>

<main>
  <div class="stats-bar">
    <span id="resultCount">লোড হচ্ছে…</span>
    <span id="loadStatus"></span>
  </div>
  <div id="app">
    <div class="loading-screen">
      <div class="loading-spinner"></div>
      <div class="loading-arabic">يُحَمَّل…</div>
      <p>অভিধান লোড হচ্ছে, একটু অপেক্ষা করুন…</p>
    </div>
  </div>
</main>

<footer>
  وافي আরবী-বাংলা অভিধান · Android অ্যাপ থেকে রূপান্তরিত · ৭৪,৮৫৫ শব্দ
</footer>

<script>
// ======================================================
// STATE
// ======================================================
let ALL_DATA    = [];
let filteredData = [];
let currentMode = 'all';
let currentPage = 1;
const PAGE_SIZE = 50;

// ===== FAVORITES (localStorage) =====
function favKey(word) { return 'fav__' + word; }

function isFav(word) {
  return localStorage.getItem(favKey(word)) === '1';
}

function toggleFav(word) {
  if (isFav(word)) localStorage.removeItem(favKey(word));
  else localStorage.setItem(favKey(word), '1');
}

function getAllFavWords() {
  const favs = [];
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (k && k.startsWith('fav__')) favs.push(k.slice(5));
  }
  return favs;
}

// ===== DARK MODE =====
function applyDark(on) {
  document.body.classList.toggle('dark', on);
  document.getElementById('darkToggle').textContent = on ? '☀ লাইট' : '🌙 ডার্ক';
  localStorage.setItem('darkMode', on ? '1' : '0');
}

document.getElementById('darkToggle').addEventListener('click', () => {
  applyDark(!document.body.classList.contains('dark'));
});

// Init dark mode from saved preference
if (localStorage.getItem('darkMode') === '1') applyDark(true);

// ======================================================
// HELPERS
// ======================================================
function isArabic(str) {
  return /[\u0600-\u06FF\u0750-\u077F\uFB50-\uFDFF\uFE70-\uFEFF]/.test(str);
}
function stripHarakat(str) {
  return str.replace(/[\u064B-\u065F\u0670]/g, '');
}
function extractPronunciation(meaning) {
  const m = meaning.match(/^\[([^\]]+)\]/);
  return m ? m[1] : null;
}
function cleanMeaning(meaning) {
  return meaning.replace(/^\[[^\]]+\]\s*/, '').trim();
}

// ======================================================
// SEARCH & FILTER
// ======================================================

// শব্দের rank নির্ধারণ করে:
// 0 = exact match (হুবহু মিলে)
// 1 = শব্দের শুরু থেকে মিলে
// 2 = মাঝে আছে
// 99 = মিলে না
function getMatchRank(wordNoH, searchNoH, q, qNoH, meaning) {
  const w = wordNoH.trim();
  const s = searchNoH.trim();

  // Exact match (হরকত ছাড়া)
  if (w === qNoH || s === qNoH) return 0;

  // শব্দের শুরু থেকে মিলে
  if (w.startsWith(qNoH) || s.startsWith(qNoH)) return 1;

  // মাঝে আছে (word এর ভেতরে)
  if (w.includes(qNoH) || s.includes(qNoH)) return 2;

  // অর্থের মধ্যে আছে
  if (meaning.includes(q)) return 3;

  return 99;
}

function applySearch(query, mode) {
  const q    = query.trim().toLowerCase();
  const qNoH = stripHarakat(q);

  if (mode === 'fav') {
    const favSet = new Set(getAllFavWords());
    let base = ALL_DATA.filter(d => favSet.has(d[0]));
    if (!q) return base;
    const ranked = [];
    for (const d of base) {
      const wordNoH = stripHarakat(d[0].toLowerCase()).trim();
      const srchNoH = stripHarakat(d[2].toLowerCase()).trim();
      const rank = getMatchRank(wordNoH, srchNoH, q, qNoH, d[1].toLowerCase());
      if (rank < 99) ranked.push({ d, rank });
    }
    ranked.sort((a, b) => a.rank - b.rank);
    return ranked.map(r => r.d);
  }

  if (!q) {
    if (mode === 'ar') return ALL_DATA.filter(d => isArabic(d[0]));
    if (mode === 'bn') return ALL_DATA.filter(d => !isArabic(d[0]));
    return ALL_DATA;
  }

  const ranked = [];
  for (const d of ALL_DATA) {
    if (mode === 'ar' && !isArabic(d[0])) continue;
    if (mode === 'bn' &&  isArabic(d[0])) continue;

    const wordNoH = stripHarakat(d[0].toLowerCase()).trim();
    const srchNoH = stripHarakat(d[2].toLowerCase()).trim();
    const rank = getMatchRank(wordNoH, srchNoH, q, qNoH, d[1].toLowerCase());
    if (rank < 99) ranked.push({ d, rank });
  }

  // Rank অনুযায়ী sort — একই rank এর মধ্যে শব্দের দৈর্ঘ্য অনুযায়ী (ছোট শব্দ আগে)
  ranked.sort((a, b) => {
    if (a.rank !== b.rank) return a.rank - b.rank;
    return a.d[0].length - b.d[0].length;
  });

  return ranked.map(r => r.d);
}

// ======================================================
// RENDER
// ======================================================
function renderPage() {
  const app = document.getElementById('app');
  const start = (currentPage - 1) * PAGE_SIZE;
  const slice = filteredData.slice(start, start + PAGE_SIZE);

  if (filteredData.length === 0) {
    const emptyMsg = currentMode === 'fav'
      ? 'এখনো কোনো শব্দ ফেভারিটে যোগ করা হয়নি।<br>শব্দের পাশের ★ চাপুন।'
      : 'কোনো ফলাফল পাওয়া যায়নি।<br>অন্য শব্দ দিয়ে খুঁজুন।';
    app.innerHTML = `
      <div class="empty-state">
        <div class="empty-arabic">${currentMode === 'fav' ? '★' : 'لا نتائج'}</div>
        <p>${emptyMsg}</p>
      </div>`;
    return;
  }

  const ul = document.createElement('ul');
  ul.id = 'resultsList';

  slice.forEach(d => {
    const [word, meaning, search] = d;
    const arabicEntry   = isArabic(word);
    const pron          = arabicEntry ? extractPronunciation(meaning) : null;
    const cleanedMeaning = arabicEntry ? cleanMeaning(meaning) : meaning;
    const previewMeaning = cleanedMeaning.length > 58
      ? cleanedMeaning.slice(0, 58) + '…'
      : cleanedMeaning;

    const li = document.createElement('li');
    li.className = 'entry-card';

    const favActive = isFav(word) ? 'active' : '';

    li.innerHTML = `
      <div class="entry-header">
        <button class="fav-btn ${favActive}" title="ফেভারিটে যোগ করুন">★</button>
        <div class="entry-word ${arabicEntry ? '' : 'bangla-word'}">${word}</div>
        <span class="entry-arrow">→</span>
        <div class="entry-preview ${arabicEntry ? '' : 'arabic-meaning'}">${previewMeaning}</div>
        <span class="entry-toggle">▾</span>
      </div>
      <div class="entry-detail">
        <div class="detail-inner">
          <div class="detail-label">${arabicEntry ? 'আরবী শব্দ' : 'বাংলা শব্দ'}</div>
          <div class="detail-word-full ${arabicEntry ? '' : 'bangla-word-full'}">${word}</div>
          ${pron ? `<div class="pronunciation">উচ্চারণ: ${pron}</div>` : ''}
          <div class="detail-label" style="margin-top:12px">${arabicEntry ? 'বাংলা অর্থ' : 'আরবী অর্থ'}</div>
          <div class="detail-meaning ${arabicEntry ? '' : 'arabic-meaning-full'}">${cleanedMeaning}</div>
        </div>
      </div>
    `;

    // Favorite button
    const favBtn = li.querySelector('.fav-btn');
    favBtn.addEventListener('click', e => {
      e.stopPropagation();
      toggleFav(word);
      favBtn.classList.toggle('active', isFav(word));
      // if in fav mode, re-render after toggle
      if (currentMode === 'fav') {
        filteredData = applySearch(document.getElementById('searchInput').value, 'fav');
        updateStats();
        renderPage();
      }
    });

    // Expand card
    li.querySelector('.entry-header').addEventListener('click', e => {
      if (e.target.classList.contains('fav-btn')) return;
      li.classList.toggle('expanded');
    });

    ul.appendChild(li);
  });

  const paginationHTML = renderPagination();
  app.innerHTML = '';
  app.appendChild(ul);

  if (paginationHTML) {
    const pDiv = document.createElement('div');
    pDiv.innerHTML = paginationHTML;
    app.appendChild(pDiv.firstChild);
    attachPaginationEvents();
  }
}

function renderPagination() {
  const totalPages = Math.ceil(filteredData.length / PAGE_SIZE);
  if (totalPages <= 1) return null;

  const maxBtns = 7;
  let s = Math.max(1, currentPage - 3);
  let e = Math.min(totalPages, s + maxBtns - 1);
  if (e - s < maxBtns - 1) s = Math.max(1, e - maxBtns + 1);

  let html = '<div class="pagination">';
  html += `<button class="page-btn" data-page="${currentPage-1}" ${currentPage===1?'disabled':''}>‹ আগে</button>`;
  for (let p = s; p <= e; p++)
    html += `<button class="page-btn ${p===currentPage?'active':''}" data-page="${p}">${p}</button>`;
  html += `<button class="page-btn" data-page="${currentPage+1}" ${currentPage===totalPages?'disabled':''}>পরে ›</button>`;
  html += '</div>';
  return html;
}

function attachPaginationEvents() {
  document.querySelectorAll('.page-btn:not([disabled])').forEach(btn => {
    btn.addEventListener('click', () => {
      currentPage = parseInt(btn.dataset.page);
      renderPage();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  });
}

function updateStats() {
  const total   = filteredData.length;
  const showing = Math.min(PAGE_SIZE, total - (currentPage-1)*PAGE_SIZE);
  const el = document.getElementById('resultCount');
  if (currentMode === 'fav') {
    el.textContent = `ফেভারিট: ${total.toLocaleString('bn')}টি শব্দ`;
  } else if (total === ALL_DATA.length) {
    el.textContent = `মোট ${total.toLocaleString('bn')} শব্দ · দেখাচ্ছে ${showing}টি`;
  } else {
    el.textContent = `${total.toLocaleString('bn')} ফলাফল · পৃষ্ঠা ${currentPage}`;
  }
}

// ======================================================
// EVENTS
// ======================================================
let searchTimer;
document.getElementById('searchInput').addEventListener('input', e => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    currentPage  = 1;
    filteredData = applySearch(e.target.value, currentMode);
    updateStats();
    renderPage();
  }, 180);
});

document.querySelectorAll('.mode-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentMode  = tab.dataset.mode;
    currentPage  = 1;
    filteredData = applySearch(document.getElementById('searchInput').value, currentMode);
    updateStats();
    renderPage();
  });
});

// ======================================================
// DATA LOADING
// ======================================================
async function loadDictionary() {
  document.getElementById('loadStatus').textContent = 'ডেটা লোড হচ্ছে…';
  try {
    const resp = await fetch('dict_data.json');
    if (!resp.ok) throw new Error('fetch failed');
    ALL_DATA     = await resp.json();
    filteredData = ALL_DATA;
    currentPage  = 1;
    updateStats();
    renderPage();
    document.getElementById('loadStatus').textContent = '';
    document.getElementById('resultCount').textContent =
      `মোট ${ALL_DATA.length.toLocaleString('bn')} শব্দ লোড সম্পন্ন`;
  } catch (err) {
    document.getElementById('app').innerHTML = `
      <div class="empty-state">
        <div class="empty-arabic">خطأ</div>
        <p><strong>ডেটা লোড করা যায়নি।</strong><br>
        dict_data.json ফাইলটি একই ফোল্ডারে আছে কিনা নিশ্চিত করুন।</p>
      </div>`;
    document.getElementById('loadStatus').textContent = '⚠ লোড ব্যর্থ';
  }
}

loadDictionary();
</script>
